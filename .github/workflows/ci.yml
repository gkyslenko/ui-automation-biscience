name: UI Smoke Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke Tests (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
      BROWSER: ${{ github.event.inputs.browser || 'chrome' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Print Chrome version
        run: google-chrome --version
      - name: Create passwords.properties
        run: |
          sed 's|\${base\.password}|${{ secrets.BASE_PASSWORD }}|g' \
            src/test/resources/config/passwords.properties.dif \
            > src/test/resources/config/passwords.properties
      - name: Run smoke tests
        run: |
          mvn test \
            -P${{ env.ENVIRONMENT }},headless \
            -Dbrowser=${{ env.BROWSER }} \
            -Dheadless=true \
        continue-on-error: true

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline@2.27.0 --quiet

      - name: Generate single-file Allure report
        if: always()
        run: allure generate --single-file target/allure-results -o target/allure-single --clean

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ env.ENVIRONMENT }}
          path: target/allure-single/index.html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ env.ENVIRONMENT }}
          path: test-output/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ env.ENVIRONMENT }}
          path: test-output/logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ env.ENVIRONMENT }}
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Check test results
        if: always()
        run: |
          python3 - <<'EOF'
          import glob, sys
          from xml.etree import ElementTree as ET

          files = glob.glob('target/surefire-reports/TEST-*.xml')
          if not files:
              print("No surefire report files found — skipping check")
              sys.exit(0)

          failures, errors = 0, 0
          for f in files:
              root = ET.parse(f).getroot()
              failures += int(root.get('failures', 0))
              errors   += int(root.get('errors',   0))

          if failures > 0 or errors > 0:
              print(f"Tests failed: {failures} failure(s), {errors} error(s)")
              sys.exit(1)
          else:
              print("All tests passed!")
          EOF
