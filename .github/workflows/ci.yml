name: UI Smoke Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke Tests (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
      BROWSER: ${{ github.event.inputs.browser || 'chrome' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Print Chrome version
        run: google-chrome --version
      - name: Create passwords.properties
        run: |
          cat > src/test/resources/config/passwords.properties << 'EOF'
          base.password=${{ secrets.BASE_PASSWORD }}
          EOF
      - name: Run smoke tests
        run: |
          mvn test \
            -P${{ env.ENVIRONMENT }},headless \
            -Dbrowser=${{ env.BROWSER }} \
            -Dheadless=true \
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: |
          mvn allure:report -B --no-transfer-progress || true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ env.ENVIRONMENT }}
          path: target/allure-results/
          retention-days: 14

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ env.ENVIRONMENT }}
          path: target/site/allure-maven-plugin/
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ env.ENVIRONMENT }}
          path: test-output/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ env.ENVIRONMENT }}
          path: test-output/logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ env.ENVIRONMENT }}
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Check test results
        if: always()
        run: |
          if [ -f target/surefire-reports/testng-results.xml ]; then
            FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/testng-results.xml | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' target/surefire-reports/testng-results.xml | grep -o '[0-9]*')
            if [ "$FAILURES" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "Tests failed: $FAILURES failure(s), $ERRORS error(s)"
              exit 1
            else
              echo "All tests passed!"
            fi
          fi
